name: Update Lottery Data

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update:
    # 저장소 소유자가 작성한 이슈만 처리 (제3자의 데이터 오염 방지)
    if: |
      github.event.issue.user.login == github.repository_owner &&
      (contains(github.event.issue.labels.*.name, 'lotto-entry') ||
       contains(github.event.issue.labels.*.name, 'pension-entry'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: update
        run: python .github/scripts/update_data.py
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}

      - name: Commit data
        if: steps.update.outputs.success == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Add round via issue #${{ github.event.issue.number }}"
          git push

      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${{ steps.update.outputs.message }}`
            });
            if ('${{ steps.update.outputs.success }}' === 'true') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
            }
