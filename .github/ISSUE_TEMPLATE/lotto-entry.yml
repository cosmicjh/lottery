name: 로또 회차 입력
description: 로또 6/45 당첨번호 추가 (저장소 데이터에 자동 반영됩니다)
title: "[로또] "
labels: ["lotto-entry"]
body:
  - type: input
    id: round
    attributes:
      label: 회차
      placeholder: "1221"
    validations:
      required: true
  - type: input
    id: numbers
    attributes:
      label: 당첨번호 6개 (쉼표로 구분)
      placeholder: "1, 7, 15, 23, 31, 42"
    validations:
      required: true
  - type: input
    id: bonus
    attributes:
      label: 보너스 번호
      placeholder: "9"
    validations:
      required: true
